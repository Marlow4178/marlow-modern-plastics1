
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics</title>
    <style>
        :root {
            --dark-navy: #061022;
            --bright-blue: #0066ff;
            --text-light: #ffffff;
            --border-light: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Separate Top Header Strip for Contacts/Hyperlinks */
        .contact-header-strip {
            background-color: #ffffff;
            border-bottom: 1px solid var(--border-light);
            padding: 0.8rem 2rem;
            font-size: 0.95rem;
        }

        .header-strip-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-links {
            display: flex;
            gap: 2rem;
        }

        .header-links a {
            color: var(--bright-blue);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.15s ease;
        }

        .header-links a:hover {
            color: var(--dark-navy);
            text-decoration: underline;
        }

        .header-location {
            color: #64748b;
            font-weight: 600;
        }

        /* Website Layout Container */
        .page-wrapper {
            max-width: 1200px;
            width: 100%;
            margin: auto;
            padding: 2rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Website Banner - Clean Layout without embedded text lists */
        .card-style-banner {
            background-color: var(--dark-navy);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(6, 16, 34, 0.25);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            width: 100%;
            min-height: 500px;
            position: relative;
        }

        /* Left Column: Deep Navy Panel with Logo and Brand Header only */
        .brand-details-panel {
            padding: 4.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: var(--text-light);
            z-index: 5;
        }

        /* High-Contrast MP Logo Layout */
        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
        }

        .outer-ring {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .inner-arc {
            position: absolute;
            width: 90%;
            height: 90%;
            border: 3.5px solid transparent;
            border-top-color: var(--bright-blue);
            border-radius: 50%;
            transform: rotate(-35deg);
        }

        .logo-initials {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text-light);
            letter-spacing: -3px;
            line-height: 1;
            margin-right: 6px;
        }

        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            line-height: 1.2;
            color: var(--text-light);
        }

        /* Right Column: Sleek Tooling and Swoop Ribbon Canvas */
        .visual-machinery-panel {
            position: relative;
            background-color: #0d1b3a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Geometric Tooling Background Simulation */
        .tooling-matrix {
            position: relative;
            width: 260px;
            height: 260px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tooling-matrix::before {
            content: '';
            width: 160px;
            height: 160px;
            border: 4px dashed rgba(0, 102, 255, 0.3);
            border-radius: 50%;
        }

        /* Flowing Blue Ribbon Curve */
        .blue-swoop-divider {
            position: absolute;
            left: -1px;
            top: 0;
            bottom: 0;
            width: 95px;
            background: linear-gradient(145deg, #0084ff, #004fc0);
            clip-path: polygon(0 0, 35% 0, 100% 100%, 0% 100%);
            z-index: 2;
        }

        /* Responsive Mobile Layout Adjustments */
        @media (max-width: 900px) {
            .card-style-banner {
                grid-template-columns: 1fr;
                min-height: auto;
            }
            .visual-machinery-panel {
                height: 220px;
                order: -1; /* Flips close-up tooling graphics to the top on mobile views */
            }
            .blue-swoop-divider {
                width: 100%;
                height: 45px;
                left: 0;
                bottom: 0;
                top: auto;
                clip-path: polygon(0 100%, 100% 100%, 100% 0, 0 75%);
            }
            .brand-details-panel {
                padding: 3.5rem 2rem;
                text-align: center;
                align-items: center;
            }
            .main-title {
                font-size: 2rem;
            }
            .header-strip-container {
                flex-direction: column;
                align-items: center;
                gap: 0.5rem;
                text-align: center;
            }
            .header-links {
                flex-direction: column;
                gap: 0.4rem;
            }
            .page-wrapper {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Separate Header & Link System -->
    <div class="contact-header-strip">
        <div class="header-strip-container">
            <div class="header-location">📍 North Palm Beach, FL 33408</div>
            <div class="header-links">
                <a href="tel:561-510-3691">📞 Call Production: 561-510-3691</a>
                <a href="mailto:Marlowmodernplastics@gmail.com">✉️ Email Us: Marlowmodernplastics@gmail.com</a>
            </div>
        </div>
    </div>

    <!-- Main Website Presentation Container -->
    <main class="page-wrapper">
        <div class="card-style-banner">
            
            <!-- Left Side Panel Layout -->
            <div class="brand-details-panel">
                <div class="logo-container">
                    <div class="outer-ring">
                        <div class="inner-arc"></div>
                        <span class="logo-initials">MP</span>
                    </div>
                </div>

                <h1 class="main-title">MARLOW MODERN PLASTICS</h1>
            </div>

            <!-- Right Side Panel Layout -->
            <div class="visual-machinery-panel">
                <div class="blue-swoop-divider"></div>
                
                <!-- Geometric shapes representing close-up precision tool machinery -->
                <div class="tooling-matrix">
                    <div style="position: absolute; transform: rotate(-45deg); font-family: monospace; font-size: 0.75rem; color: var(--bright-blue); letter-spacing: 2px; font-weight: 700; text-transform: uppercase;">
                        Precision Tooling
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer style="text-align: center; padding: 2rem; color: #64748b; font-size: 0.85rem; margin-top: auto; background-color: #ffffff; border-top: 1px solid var(--border-light);">
        &copy; 2026 Marlow Modern Plastics &bull; High-Performance Engineering.
    </footer>

</body>
</html>
