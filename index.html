
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics</title>
    <style>
        :root {
            --navy-blue: #022047;
            --electric-blue: #006ce6;
            --border-light: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f3f4f6;
            color: #111827;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Standalone Header Area for Contact Info */
        .info-header-strip {
            background-color: #ffffff;
            border-bottom: 1px solid var(--border-light);
            padding: 0.8rem 2rem;
            font-size: 0.95rem;
        }

        .info-strip-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .comms-links {
            display: flex;
            gap: 2rem;
        }

        .comms-links a {
            color: var(--electric-blue);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.15s ease;
        }

        .comms-links a:hover {
            color: var(--navy-blue);
            text-decoration: underline;
        }

        .location-header {
            color: #4b5563;
            font-weight: 600;
        }

        /* Main Website Layout Frame */
        .content-container {
            max-width: 1100px;
            width: 100%;
            margin: auto;
            padding: 2rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* True Card Presentation Frame */
        .web-hero-showcase {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 3 / 2; /* Maintains the exact business card dimensions */
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(2, 32, 71, 0.18);
            border: 1px solid var(--border-light);
            overflow: hidden;
            
            /* Uses a secure, optimized placeholder representing your exact high-contrast layout */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" viewBox="0 0 900 600" width="100%" height="100%"><rect width="900" height="600" fill="%23ffffff"/><path d="M420,0 C490,120 530,240 600,600 L900,600 L900,0 Z" fill="%23022047"/><path d="M425,0 C475,150 515,300 585,600 L610,600 C540,300 500,150 450,0 Z" fill="%23006ce6"/><circle cx="240" cy="230" r="160" fill="none" stroke="%23022047" stroke-width="12"/><path d="M120,150 L120,310 L170,310 L170,210 L240,290 L310,210 L310,310 L360,310 L360,150 L300,150 L240,220 L180,150 Z" fill="%23022047"/><path d="M250,220 L250,380 L300,380 L300,310 L350,310 C400,310 420,280 420,250 C420,220 390,220 350,220 Z M300,250 L340,250 C360,250 370,250 370,265 C370,280 360,280 340,280 L300,280 Z" fill="%23022047"/><path d="M130,120 A 145 145 0 0 1 350,120" fill="none" stroke="%23006ce6" stroke-width="6"/><text x="80" y="475" font-family="system-ui,sans-serif" font-weight="800" font-size="36" fill="%23022047" letter-spacing="1">MARLOW MODERN PLASTICS</text><text x="640" y="320" font-family="system-ui,sans-serif" font-weight="700" font-size="24" fill="%23ffffff" letter-spacing="3">PRECISION</text><text x="635" y="360" font-family="system-ui,sans-serif" font-weight="700" font-size="24" fill="%23ffffff" letter-spacing="3">TOOLING</text></svg>');
            background-size: cover;
            background-position: center;
        }

        /* Responsive Scaling Rules for Mobile Screens */
        @media (max-width: 768px) {
            .content-container {
                padding: 1rem;
            }
            
            .info-strip-container {
                flex-direction: column;
                align-items: center;
                gap: 0.6rem;
                text-align: center;
            }

            .comms-links {
                flex-direction: column;
                gap: 0.5rem;
            }

            .web-hero-showcase {
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(2, 32, 71, 0.1);
            }
        }
    </style>
</head>
<body>

    <!-- Extracted Standalone Header & Hyperlink Systems -->
    <div class="info-header-strip">
        <div class="info-strip-container">
            <div class="location-header">📍 Headquarters: North Palm Beach, FL 33408</div>
            <div class="comms-links">
                <a href="tel:561-510-3691">📞 Call Us: 561-510-3691</a>
                <a href="mailto:Marlowmodernplastics@gmail.com">✉️ Email Us: Marlowmodernplastics@gmail.com</a>
            </div>
        </div>
    </div>

    <!-- Website Workspace Container -->
    <main class="content-container">
        <!-- This container scales the card format cleanly to any browser window size -->
        <div class="web-hero-showcase"></div>
    </main>

    <footer style="text-align: center; padding: 1.5rem; color: #6b7280; font-size: 0.85rem; background: #ffffff; border-top: 1px solid var(--border-light);">
        &copy; 2026 Marlow Modern Plastics. All rights reserved.
    </footer>

</body>
</html>
