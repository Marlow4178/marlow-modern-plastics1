<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics LLC</title>
    <style>
        :root {
            --navy: #002244;
            --blue: #0066cc;
            --dark: #223344;
            --muted: #667788;
            --light: #f4f8fc;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--dark);
            line-height: 1.6;
            background-color: var(--white);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* --- Header & Navigation Bar --- */
        header {
            background-color: var(--white);
            border-bottom: 1px solid #e2e8f0;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .nav-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .logo-svg {
            width: 46px;
            height: 46px;
        }

        .logo-text h1 {
            font-size: 22px;
            color: var(--navy);
            font-weight: 800;
            letter-spacing: 1.5px;
            line-height: 0.95;
            text-transform: uppercase;
        }

        .logo-text span {
            font-size: 10px;
            color: var(--blue);
            font-weight: 700;
            display: block;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        nav a {
            text-decoration: none;
            color: var(--navy);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
        }

        .quote-btn, .btn-primary {
            background-color: var(--blue);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        /* --- Welcome Hero Section --- */
        .hero {
            margin-top: 80px;
            padding: 80px 0;
            background: linear-gradient(135deg, #ffffff 40%, #f4f8fc 100%);
        }

        .hero .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 48px;
            flex-wrap: wrap;
        }

        .hero-left {
            flex: 1;
            min-width: 300px;
            max-width: 580px;
        }

        .hero-title-bar {
            width: 40px;
            height: 3px;
            background-color: var(--blue);
            margin: 24px 0;
        }

        .hero h2 {
            font-size: 26px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 32px;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--blue);
            border: 2px solid var(--blue);
            padding: 10px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 700;
        }

        .hero-right-graphic {
            flex: 1;
            min-width: 300px;
            max-width: 440px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 15px 40px rgba(0,34,68,0.06);
        }

        /* --- Service Columns --- */
        .pillars {
            padding: 80px 0;
            background-color: var(--white);
            border-top: 1px solid #edf2f7;
        }

        .pillars-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
        }

        .pillar-card {
            flex: 1;
            min-width: 220px;
            text-align: center;
            padding: 16px;
        }

        .pillar-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 20px auto;
            color: var(--blue);
        }

        .pillar-card h3 {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--navy);
            margin-bottom: 12px;
            font-weight: 800;
        }

        .pillar-card p {
            font-size: 13px;
            color: var(--muted);
        }

        /* --- Summary Section --- */
        .who-we-are {
            padding: 80px 0;
            background-color: var(--light);
        }

        .who-grid {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 64px;
        }

        .who-left {
            flex: 1;
            min-width: 300px;
        }

        .who-tag {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--blue);
            font-weight: 800;
            margin-bottom: 8px;
            display: block;
        }

        .who-left h2 {
            font-size: 32px;
            color: var(--navy);
            font-weight: 800;
            margin-bottom: 24px;
        }

        .bullet-list {
            list-style: none;
            margin-top: 24px;
        }

        .bullet-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            font-size: 14px;
            font-weight: 600;
        }

        .check-icon {
            width: 18px;
            height: 18px;
            color: var(--blue);
        }

        .who-right-graphic {
            flex: 1;
            min-width: 300px;
            max-width: 440px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 32px;
        }

        /* --- Office Contact Blocks --- */
        .contact-strip {
            padding: 80px 0;
            text-align: center;
        }

        .contact-strip h2 {
            font-size: 36px;
            color: var(--navy);
            margin-bottom: 56px;
        }

        .contact-row {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }

        .contact-card {
            flex: 1;
            min-width: 250px;
            max-width: 320px;
        }

        .contact-icon-box {
            width: 54px;
            height: 54px;
            background-color: var(--light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            color: var(--blue);
        }

        .contact-card p {
            font-size: 15px;
            color: var(--navy);
            font-weight: 700;
        }

        /* --- Footer --- */
        footer {
            background-color: var(--navy);
            color: var(--white);
            padding: 64px 0 32px 0;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 32px;
            padding-bottom: 48px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .footer-left .logo-text h1 { color: var(--white); }

        .footer-right p {
            font-size: 14px;
            color: #a0aec0;
            max-width: 540px;
        }

        .copyright {
            text-align: center;
            padding-top: 32px;
            font-size: 12px;
            color: #718096;
        }

        /* --- Quote Window Pop Up --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 34, 68, 0.6);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-window {
            background-color: var(--white);
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            padding: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .nav-box { flex-direction: column; height: auto; padding: 16px 0; gap: 16px; }
            .hero { margin-top: 140px; }
        }
    </style>
</head>
<body>
