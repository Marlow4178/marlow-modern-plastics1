
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics</title>
    <style>
        :root {
            --navy: #0a1128;
            --blue: #0076df;
            --light-bg: #f4f7fa;
            --text-dark: #1e2530;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Clean Corporate Navigation */
        header {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--blue);
        }

        /* Full Website Main Layout Container */
        .main-showcase {
            max-width: 1200px;
            width: 100%;
            margin: 3rem auto;
            padding: 0 2rem;
            flex: 1;
        }

        /* Premium Website Feature Section (Replicating the Preview Theme) */
        .showcase-banner {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(10, 17, 40, 0.06);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            min-height: 500px;
            border: 1px solid #eef2f6;
        }

        /* Left Side Panel: High-Contrast Branding Details */
        .branding-panel {
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            background: #ffffff;
        }

        /* Recreated Precision MP High-Contrast Logo Graphic Layout */
        .logo-box {
            display: flex;
            align-items: center;
            position: relative;
            margin-bottom: 2.5rem;
            width: fit-content;
        }

        .logo-circle-graphic {
            width: 90px;
            height: 90px;
            border: 4px solid var(--navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-circle-graphic::after {
            content: '';
            position: absolute;
            width: 90%;
            height: 90%;
            border: 3px solid transparent;
            border-top-color: var(--blue);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        .logo-letters {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--navy);
            letter-spacing: -2px;
            line-height: 1;
            margin-right: 4px;
        }

        /* Business Text Formatting */
        .company-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--navy);
            letter-spacing: -0.5px;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .contact-info-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            font-size: 1.1rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .contact-info-list li {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .label-text {
            color: var(--text-muted);
            font-weight: 400;
            width: 65px;
            display: inline-block;
        }

        /* Right Side Panel: Sleek Tooling Graphics Layout */
        .graphics-panel {
            position: relative;
            background-color: #eef5fc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Elegant Abstract Mechanical Tooling Simulation Backdrop */
        .graphics-panel::before {
            content: '';
            position: absolute;
            width: 320px;
            height: 320px;
            border: 24px solid #ffffff;
            border-radius: 12px;
            transform: rotate(45deg);
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        .graphics-panel::after {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            border: 6px dashed var(--blue);
            border-radius: 50%;
            opacity: 0.25;
        }

        /* The Gorgeous Flowing Blue Divider Wave Curve */
        .swoop-divider {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background: linear-gradient(to bottom, #0084ff, #004fc0);
            clip-path: polygon(0 0, 30% 0, 100% 100%, 0% 100%);
            z-index: 2;
        }

        /* Responsive Mobile Scaling Fixes */
        @media (max-width: 900px) {
            .showcase-banner {
                grid-template-columns: 1fr;
            }
            .graphics-panel {
                height: 250px;
                order: -1; /* Puts graphics on top for mobile views */
            }
            .swoop-divider {
                width: 100%;
                height: 40px;
                left: 0;
                bottom: 0;
                top: auto;
                clip-path: polygon(0 100%, 100% 100%, 100% 0, 0 70%);
            }
            .branding-panel {
                padding: 2.5rem 1.5rem;
            }
            .company-name {
                font-size: 1.8rem;
            }
            .main-showcase {
                margin: 1rem auto;
                padding: 0 1rem;
            }
            .nav-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div style="font-weight: 800; color: var(--navy); font-size: 1.2rem;">Marlow Plastics</div>
            <ul class="nav-links">
                <li><a href="mailto:marlow@modernplastics.com">Email Us</a></li>
                <li><a href="tel:561-510-3691">Call Production</a></li>
            </ul>
        </div>
    </header>

    <main class="main-showcase">
        <div class="showcase-banner">
            
            <!-- Left Side: Clean high-contrast card styling expanded to webpage layout -->
            <div class="branding-panel">
                <div class="logo-box">
                    <div class="logo-circle-graphic">
                        <span class="logo-letters">MP</span>
                    </div>
                </div>

                <h1 class="company-name">MARLOW MODERN PLASTICS</h1>

                <ul class="contact-info-list">
                    <li><span class="label-text">email:</span> marlow@modernplastics.com</li>
                    <li><span class="label-text">Phone:</span> 561-510-3691</li>
                    <li><span class="label-text">Address:</span> North Palm Beach, FL 33408</li>
                </ul>
            </div>

            <!-- Right Side: Sleek structural machinery graphic canvas -->
            <div class="graphics-panel">
                <div class="swoop-divider"></div>
                <!-- Abstract interior element representing high precision engineering components -->
                <div style="position: relative; z-index: 1; font-weight: 700; color: var(--blue); letter-spacing: 2px; font-size: 0.8rem; text-transform: uppercase;">
                    Precision Tooling Facility
                </div>
            </div>

        </div>
    </main>

    <footer style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.85rem; margin-top: auto;">
        &copy; 2026 Marlow Modern Plastics. All rights reserved.
    </footer>

</body>
</html>
