<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics LLC</title>
    <style>
        /* --- Universal Reset & Variables --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --primary-navy: #002244;
            --accent-blue: #0066cc;
            --text-dark: #223344;
            --text-muted: #667788;
            --bg-light: #f4f8fc;
            --white: #ffffff;
        }
        body {
            font-family: Arial, sans-serif;
            color: var(--text-dark);
            line-height: 1.6;
            background-color: var(--white);
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- Global Logo Layout --- */
        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid var(--primary-navy);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-circle svg {
            width: 26px;
            height: 26px;
        }
        .logo-text h1 {
            font-size: 20px;
            color: var(--primary-navy);
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1;
            text-transform: uppercase;
        }
        .logo-text span {
            font-size: 10px;
            color: var(--accent-blue);
            font-weight: bold;
            display: block;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* --- Top Navigation Header --- */
        header {
            background-color: var(--white);
            border-bottom: 1px solid #e2e8f0;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .nav-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }
        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: var(--primary-navy);
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
        }
        nav a.quote-btn {
            background-color: var(--accent-blue);
            color: var(--white);
            padding: 10px 18px;
            border-radius: 4px;
        }

        /* --- Structural Hero Split Section --- */
        .hero {
            margin-top: 80px;
            padding: 80px 0;
            background: linear-gradient(135deg, #ffffff 50%, var(--bg-light) 100%);
        }
        .hero .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            flex-wrap: wrap;
        }
        .hero-left {
            flex: 1;
            min-width: 300px;
            max-width: 600px;
        }
        .hero-title-bar {
            width: 40px;
            height: 3px;
            background-color: var(--accent-blue);
            margin: 20px 0;
        }
        .hero h2 {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary-navy);
        }
        .hero p {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .btn-primary {
            display: inline-block;
            background-color: var(--accent-blue);
            color: var(--white);
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            margin-right: 15px;
        }
        .btn-outline {
            display: inline-block;
            background-color: transparent;
            color: var(--accent-blue);
            border: 2px solid var(--accent-blue);
            padding: 10px 22px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
        }
        .hero-right {
            flex: 1;
            min-width: 300px;
            max-width: 420px;
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        /* --- 4-Column Feature Grid --- */
        .features {
            padding: 60px 0;
            background-color: var(--white);
            border-top: 1px solid #edf2f7;
        }
        .features-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .feature-card {
            flex: 1;
            min-width: 220px;
            text-align: center;
            padding: 15px;
        }
        .feature-card h3 {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--primary-navy);
            margin-bottom: 10px;
            font-weight: 800;
        }
        .feature-card p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* --- Detailed Summary Row --- */
        .about-block {
            padding: 80px 0;
            background-color: var(--bg-light);
        }
        .about-grid {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 40px;
        }
        .about-left {
            flex: 1;
            min-width: 300px;
        }
        .about-tag {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent-blue);
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }
        .about-left h2 {
            font-size: 28px;
            color: var(--primary-navy);
            margin-bottom: 20px;
            font-weight: 800;
        }
        .about-left p {
            font-size: 15px;
            margin-bottom: 15px;
        }
        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            font-weight: bold;
            font-size: 14px;
            color: var(--primary-navy);
        }
        .about-right {
            flex: 1;
            min-width: 300px;
            max-width: 420px;
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 30px;
        }

        /* --- Clear Contact Rows --- */
        .contact-section {
            padding: 80px 0;
            text-align: center;
            background-color: var(--white);
        }
        .contact-section h4 {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .contact-section h2 {
            font-size: 32px;
            color: var(--primary-navy);
            margin-bottom: 40px;
            font-weight: 800;
        }
        .contact-row {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }
        .contact-card {
            flex: 1;
            min-width: 240px;
            max-width: 300px;
            background: var(--bg-light);
            padding: 20px;
            border-radius: 6px;
        }
        .contact-card h5 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent-blue);
            margin-bottom: 5px;
        }
        .contact-card p {
            font-size: 15px;
            font-weight: bold;
            color: var(--primary-navy);
        }

        /* --- Footer --- */
        footer {
            background-color: var(--primary-navy);
            color: var(--white);
            padding: 60px 0 30px 0;
        }
        .footer-box {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
            align-items: center;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .footer-right p {
            font-size: 13px;
            color: #a0aec0;
            max-width: 450px;
        }
        .copyright {
            text-align: center;
            padding-top: 30px;
            font-size: 12px;
            color: #718096;
        }

        /* --- Responsive Styles --- */
        @media (max-width: 768px) {
            .nav-box { flex-direction: column; height: auto; padding: 15px 0; gap: 15px; }
            .hero { margin-top: 130px; }
            .hero-left { text-align: center; }
            .hero-title-bar { margin: 20px auto; }
            .footer-box { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="container nav-box">
            <div class="logo-group">
                <div class="logo-circle">
                    <svg viewBox="0 0 100 100" xmlns="http://w3.org">
                        <path d="M 20,72 L 20,28 L 45,54 L 70,28 L 70,72 M 70,28 L 80,28 C 88,28 88,46 80,46 L 70,46" fill="none" stroke="#002244" stroke-width="9" stroke-linecap="square"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Marlow</h1>
                    <span>Modern Plastics LLC</span>
                </div>
            </div>
            <nav>
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Services</a>
                <a href="#">Contact</a>
