<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics LLC</title>
    <style>
        /* --- General Page Setup --- */
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: Arial, sans-serif;
            color: #333333;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- Header Navigation --- */
        header {
            background-color: #ffffff;
            border-bottom: 2px solid #e0e0e0;
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .nav-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Inline Vector Monogram Logo Branding */
        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-box {
            width: 45px;
            height: 45px;
            background-color: #031424;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }
        .brand h1 {
            margin: 0;
            font-size: 22px;
            color: #0d3b66;
            line-height: 1.1;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .brand p {
            margin: 0;
            font-size: 11px;
            color: #0077b6;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333333;
            font-weight: bold;
            font-size: 14px;
        }
        nav a:hover {
            color: #0077b6;
        }
        
        /* Interactive Modal Launcher Triggers */
        .quote-btn, .btn-modal-trigger {
            background-color: #0056b3;
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 4px;
            border: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }
        .quote-btn:hover, .btn-modal-trigger:hover {
            background-color: #0d3b66;
        }

        /* --- Split Showcase Hero Layout --- */
        .hero {
            margin-top: 75px;
            padding: 100px 0;
            background: linear-gradient(135deg, #ffffff 40%, #f4f9ff 100%);
        }
        .hero .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            flex-wrap: wrap;
        }
        .hero-left {
            flex: 1;
            min-width: 300px;
            max-width: 600px;
        }
        .hero-title {
            font-size: 36px;
            color: #051923;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .hero-subtitle {
            font-size: 22px;
            color: #0077b6;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .hero p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #444444;
        }
        .btn-modal-trigger-large {
            display: inline-block;
            background-color: #0056b3;
            color: #ffffff;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            margin-right: 15px;
            margin-bottom: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-modal-trigger-large:hover {
            background-color: #0d3b66;
        }
        .btn-outline {
            display: inline-block;
            background-color: transparent;
            color: #0056b3;
            border: 2px solid #0056b3;
            padding: 10px 23px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
        }
        .btn-outline:hover {
            background-color: #0056b3;
            color: #ffffff;
        }

        /* --- Integrated Vector CNC Graphic Deck --- */
        .hero-right {
            flex: 1;
            min-width: 300px;
            max-width: 440px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 15px 40px rgba(0,34,68,0.06);
        }

        /* --- Core Services Grid --- */
        .services {
            padding: 80px 0 40px 0;
        }
        .services-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
        }
        .service-box {
            flex: 1;
            min-width: 230px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 25px;
            border-radius: 6px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
        }
        .service-box h3 {
            color: #051923;
            margin-top: 0;
            margin-bottom: 15px;
        }

        /* --- Business Description --- */
        .about {
            background-color: #ffffff;
            padding: 80px 0 40px 0;
            border-top: 1px solid #e0e0e0;
        }
        .about h2 {
            color: #051923;
            font-size: 28px;
        }
        .bullets {
            margin-top: 20px;
            padding-left: 20px;
        }
        .bullets li {
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* --- Direct Office Contact --- */
        .contact {
            background-color: #f4f9ff;
            padding: 80px 0;
            text-align: center;
        }
        .contact h2 {
            margin-bottom: 40px;
        }
        .contact-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 20px;
        }
        .contact-item h4 {
            margin: 0 0 5px 0;
            color: #777777;
            text-transform: uppercase;
        }
        .contact-item p {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
        }

        /* --- Footer --- */
        footer {
            background-color: #051923;
            color: #ffffff;
            padding: 40px 0;
            font-size: 14px;
        }
        .footer-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .footer-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .footer-left .logo-box {
            border: 1px solid #ffffff;
        }
        .footer-right {
            text-align: right;
            color: #cccccc;
        }
        .copyright {
            text-align: center;
            margin-top: 30px;
            color: #777777;
            font-size: 12px;
        }

        /* --- Lightbox Modal Popup Form Window --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(3, 20, 36, 0.7);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-window {
            background-color: #ffffff;
            border-radius: 8px;
            width: 90%;
            max-width: 480px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }
        .modal-window h3 {
            color: #051923;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #0d3b66;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #0066cc;
        }
        .form-btn-submit {
            width: 100%;
            background-color: #0056b3;
            color: #ffffff;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }
        .form-btn-submit:hover {
            background-color: #0d3b66;
        }
        .form-btn-close {
            width: 100%;
            background-color: #e2e8f0;
            color: #333333;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        .form-btn-close:hover {
            background-color: #cbd5e0;
        }

        /* --- Responsive Viewports --- */
        @media (max-width: 768px) {
