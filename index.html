<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics LLC</title>
    <style>
        /* --- General Page Setup --- */
        body {
            font-family: Arial, sans-serif;
            color: #333333;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #ffffff;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- Custom Rebuilt Logo Vector System --- */
        .logo-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-wrapper {
            position: relative;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #0066ff;
            border-radius: 50%;
            box-sizing: border-box;
            border-bottom-color: transparent;
            transform: rotate(-45deg);
        }
        .logo-letters {
            color: #0b1d3a;
            font-size: 22px;
            font-weight: 900;
            font-family: 'Arial Black', sans-serif;
            letter-spacing: -2px;
            position: relative;
            left: -1px;
            z-index: 2;
            line-height: 1;
        }
        .logo-text h1 {
            margin: 0;
            font-size: 22px;
            color: #0b1d3a;
            letter-spacing: 1.5px;
            line-height: 1.1;
            font-weight: 900;
        }
        .logo-text span {
            margin: 0;
            font-size: 10px;
            color: #0066ff;
            font-weight: bold;
            display: block;
            letter-spacing: 1px;
        }

        /* --- Header Navigation --- */
        header {
            background-color: #ffffff;
            border-bottom: 3px solid #0b1d3a;
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(11, 29, 58, 0.08);
        }
        .nav-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
            margin-left: 22px;
            text-decoration: none;
            color: #0b1d3a;
            font-weight: bold;
            font-size: 14px;
            transition: color 0.2s ease;
        }
        nav a:hover {
            color: #0066ff;
        }
        nav a.quote-btn {
            background-color: #0066ff;
            color: #ffffff;
            padding: 10px 18px;
            border-radius: 4px;
        }
        nav a.quote-btn:hover {
            background-color: #0b1d3a;
        }

        /* --- Hero Banner (Faded CNC Background Layout) --- */
        .hero {
            margin-top: 85px;
            padding: 120px 0;
            position: relative;
            background-color: #0b1d3a;
            /* Linear gradients fade the specific CNC machining picture into transparency */
            background-image: linear-gradient(90deg, #0b1d3a 35%, rgba(11, 29, 58, 0.85) 60%, rgba(11, 29, 58, 0.4) 100%), 
                              url('https://unsplash.com');
            background-size: cover;
            background-position: center right;
            background-repeat: no-repeat;
        }
        .hero-left {
            max-width: 600px;
            color: #ffffff;
        }
        .hero .big-logo {
            margin-bottom: 30px;
        }
        .hero .big-logo .logo-wrapper {
            width: 80px;
            height: 80px;
        }
        .hero .big-logo .logo-ring {
            border-width: 4px;
            border-color: #0066ff;
            border-bottom-color: transparent;
        }
        .hero .big-logo .logo-letters {
            color: #ffffff;
            font-size: 38px;
        }
        .hero .big-logo .logo-text h1 {
            color: #ffffff;
            font-size: 36px;
        }
        .hero .big-logo .logo-text span {
            color: #0066ff;
            font-size: 14px;
        }
        .hero-subtitle {
            font-size: 26px;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 20px;
            border-left: 5px solid #0066ff;
            padding-left: 15px;
        }
        .hero p {
            font-size: 16px;
            margin-bottom: 35px;
            color: #dddddd;
        }
        .btn {
            display: inline-block;
            background-color: #0066ff;
            color: #ffffff;
            padding: 12px 28px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            margin-right: 15px;
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: #ffffff;
            color: #0b1d3a;
        }
        .btn-outline {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #0066ff;
            padding: 10px 26px;
        }
        .btn-outline:hover {
            background-color: #0066ff;
            color: #ffffff;
        }

        /* --- Core Services Grid --- */
        .services {
            padding: 70px 0;
            background-color: #ffffff;
        }
        .services-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: space-between;
        }
        .service-box {
            flex: 1;
            min-width: 230px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 30px 25px;
            border-radius: 6px;
            text-align: center;
            border-top: 4px solid #0b1d3a;
            box-shadow: 0 4px 6px rgba(11, 29, 58, 0.02);
            transition: transform 0.2s ease, border-top-color 0.2s ease;
        }
        .service-box:hover {
            transform: translateY(-4px);
            border-top-color: #0066ff;
        }
        .service-box h3 {
            color: #0b1d3a;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
        }

        /* --- Business Description --- */
        .about {
            background-color: #f8fafc;
            padding: 70px 0;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
        }
        .about h2 {
            color: #0b1d3a;
            font-size: 32px;
            margin-top: 10px;
        }
        .bullets {
            margin-top: 25px;
            padding-left: 0;
            list-style: none;
        }
        .bullets li {
            margin-bottom: 12px;
            font-weight: bold;
            color: #0b1d3a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .bullets li::before {
            content: "✓";
            color: #0066ff;
            font-weight: 900;
            font-size: 18px;
        }

        /* --- Direct Office Contact --- */
        .contact {
            background-color: #ffffff;
            padding: 70px 0;
            text-align: center;
        }
        .contact h2 {
            margin-bottom: 45px;
            color: #0b1d3a;
            font-size: 32px;
        }
        .contact-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 25px;
        }
        .contact-item {
            background: #f8fafc;
            padding: 25px 40px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            min-width: 250px;
        }
        .contact-item h4 {
            margin: 0 0 8px 0;
            color: #0066ff;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .contact-item p {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
            color: #0b1d3a;
        }

        /* --- Footer --- */
        footer {
            background-color: #0b1d3a;
            color: #ffffff;
            padding: 50px 0 30px 0;
            font-size: 14px;
        }
        .footer-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
            align-items: center;
        }
        .footer-left .logo-text h1 {
            color: #ffffff;
        }
        .footer-left .logo-letters {
            color: #ffffff;
        }
        .footer-left .logo-ring {
            border-color: #0066ff;
            border-bottom-color: transparent;
        }
        .footer-right {
            max-width: 500px;
            text-align: right;
            color: #cbd5e1;
        }
        .copyright {
            text-align: center;
            margin-top: 40px;
            color: #64748b;
            font-size: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }

        /* --- Simple Responsive Fallbacks --- */
        @media (max-width: 768px) {
            .nav-box { flex-direction: column; gap: 20px; text-align: center; }
            nav a { margin: 0 10px; display: inline-block; }
            .hero { background-image: linear-gradient(180deg, #0b1d3a 80%, rgba(11, 29, 58, 0.4) 100%); padding: 80px 0; }
            .footer-row { flex-direction: column; text-align: center; }
            .footer-right { text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="container nav-box">
