<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 1:1 Aspect Frame matching the smooth business card format */
        .card-canvas {
            background-color: #ffffff;
            width: 100%;
            max-width: 950px;
            aspect-ratio: 1.54 / 1; 
            border-radius: 14px;
            box-shadow: 0 20px 45px rgba(13, 35, 58, 0.12);
            position: relative;
            overflow: hidden;
            display: flex;
        }

        /* LEFT SIDE - BRANDING PANEL */
        .brand-panel {
            width: 54%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 7% 0 9% 7%;
            position: relative;
            z-index: 10;
            background-color: #ffffff;
        }

        .logo-container {
            width: 78%;
            max-width: 300px;
        }

        .mp-crest-logo {
            width: 100%;
            height: auto;
        }

        .company-heading {
            color: #0d233a;
            font-size: clamp(1.4rem, 3.1vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        /* RIGHT SIDE - INDUSTRIAL & CURVE GRAPHIC PANEL */
        .graphic-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 53%;
            height: 100%;
            z-index: 1;
        }

        /* Vercel-ready mechanical rendering engine for the milling setup */
        .machinery-viewport {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #eef1f6 0%, #cbd5e1 100%);
            overflow: hidden;
        }

        /* Vertical Spindle Unit */
        .machining-spindle {
            position: absolute;
            top: 0;
            right: 25%;
            width: 90px;
            height: 48%;
            background: linear-gradient(90deg, #555 0%, #ccc 25%, #fff 50%, #999 75%, #444 100%);
            border-bottom: 6px solid #222;
        }

        /* Precision Threaded Lines along the shaft */
        .spindle-threads {
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            height: 60px;
            background: repeating-linear-gradient(0deg, transparent, transparent 4px, #444 4px, #444 6px);
            opacity: 0.4;
        }

        /* Structural Milling Table Base blocks */
        .machine-block-base {
            position: absolute;
            bottom: 12%;
            right: 8%;
            width: 160px;
            height: 100px;
            background: linear-gradient(180deg, #94a3b8 0%, #64748b 100%);
            border: 2px solid #475569;
            border-radius: 4px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        /* The Micrometric Adjustment Dial with Measurement Notches */
        .adjustment-dial {
            position: absolute;
            bottom: 22%;
            right: 32%;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%);
            border: 3px solid #475569;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: -4px 6px 12px rgba(0,0,0,0.15);
        }

        .dial-刻度-markings {
            width: 82%;
            height: 82%;
            border-radius: 50%;
            border: 1px dashed #334155;
            background: repeating-conic-gradient(from 0deg, #64748b 0deg 5deg, transparent 5deg 15deg);
            opacity: 0.6;
        }

        /* Precise SVG Ribbon Vector curves layout */
        .swoosh-overlay {
            position: absolute;
            top: 0;
            left: -1px;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* Mobile Breakpoint Engine */
        @media (max-width: 680px) {
            .card-canvas {
                aspect-ratio: auto;
                height: auto;
                flex-direction: column-reverse;
            }
            .brand-panel {
                width: 100%;
                padding: 40px 25px;
            }
            .graphic-panel {
                position: relative;
                width: 100%;
                height: 260px;
            }
            .swoosh-overlay {
                transform: rotate(90deg);
                width: 100%;
                height: 100%;
                left: 0;
                top: -2px;
            }
        }
    </style>
</head>
<body>

    <div class="card-canvas">
        
        <!-- Left panel tracking text layers and MP circular geometric stamp -->
        <div class="brand-panel">
            <div class="logo-container">
                <svg class="mp-crest-logo" viewBox="0 0 500 500" fill="none" xmlns="http://w3.org">
                    <!-- Outer frame circular sweep path -->
                    <path d="M 235,45 C 340,45 420,125 420,235 C 420,345 340,425 235,425 C 145,425 72,362 55,278" stroke="#0d233a" stroke-width="28" stroke-linecap="round"/>
                    <!-- Geometric Intersecting M lines layout -->
                    <path d="M 52,375 L 52,185 L 165,312 L 278,185 L 278,375" stroke="#0d233a" stroke-width="42" stroke-linecap="square" stroke-linejoin="miter"/>
                    <!-- Geometric Intersecting P loop track -->
                    <path d="M 278,185 L 372,185 C 422,185 422,282 372,282 L 278,282" stroke="#0d233a" stroke-width="42" stroke-linecap="square" stroke-linejoin="miter"/>
                </svg>
            </div>
            
            <h1 class="company-heading">Marlow Modern<br>Plastics</h1>
        </div>

        <!-- Right panel containing full geometric vectors and vector machine assembly elements -->
        <div class="graphic-panel">
            <div class="machinery-viewport">
                <div class="machining-spindle">
                    <div class="spindle-threads"></div>
                </div>
                <div class="machine-block-base"></div>
                <div class="adjustment-dial">
                    <div class="dial-刻度-markings"></div>
                </div>
            </div>
            
            <!-- Dynamic Vector Overlay Layer Mapping out the curved split borders -->
            <svg class="swoosh-overlay" viewBox="0 0 500 500" preserveAspectRatio="none" fill="none" xmlns="http://w3.org">
                <!-- Under-curve soft shading depth layer -->
                <path d="M 125,0 C 75,180 85,320 205,500 L 0,500 L 0,0 Z" fill="#0056b3" opacity="0.12"/>
                <!-- Solid white panel background divider profile -->
                <path d="M 95,0 C 50,165 60,335 165,500 L 0,500 L 0,0 Z" fill="#ffffff"/>
                <!-- Primary sharp corporate royal blue curved ribbon -->
                <path d="M 115,0 C 70,165 80,335 185,500 L 142,500 C 42,335 32,165 78,0 Z" fill="#0056b3"/>
            </svg>
        </div>

    </div>

</body>
</html>
