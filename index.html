<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics LLC</title>
    <style>
        /* --- General Page Setup --- */
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: Arial, sans-serif;
            color: #333333;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #ffffff;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- Header Navigation --- */
        header {
            background-color: transparent;
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .nav-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
        }
        
        /* Brand Logo Graphics */
        .logo-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .logo-svg {
            width: 140px;
            height: auto;
        }
        .logo-subtext {
            color: #ffffff;
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 0.8px;
            margin-top: 4px;
            opacity: 0.9;
        }

        nav {
            display: flex;
            gap: 25px;
        }
        nav a {
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.85;
            transition: opacity 0.2s ease;
        }
        nav a:hover {
            opacity: 1;
        }

        /* --- Hero Section with Background Image --- */
        .hero {
            padding: 160px 0 100px 0;
            position: relative;
            background-image: linear-gradient(to right, rgba(3, 20, 36, 0.95) 40%, rgba(3, 20, 36, 0.5) 100%), 
                              url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
        }
        .hero-content {
            max-width: 550px;
        }
        .hero-title {
            font-size: 52px;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        .hero-subtitle {
            font-size: 14px;
            color: #0088ff;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 35px;
            opacity: 0.85;
        }
        
        /* Hero Action Buttons */
        .hero-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn-phone {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #0056b3;
            color: #ffffff;
            padding: 12px 28px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border-radius: 4px;
            transition: background 0.2s ease;
        }
        .btn-phone:hover {
            background-color: #004494;
        }
        .btn-email {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 12px 28px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.05);
            transition: background 0.2s ease;
        }
        .btn-email:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }
        .btn-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* --- What We Do Grid --- */
        .services {
            padding: 70px 0 90px 0;
            text-align: center;
            background-color: #ffffff;
        }
        .section-tag {
            font-size: 11px;
            font-weight: bold;
            color: #0056b3;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 10px;
        }
        .section-tag::before, .section-tag::after {
            content: " — ";
            color: #cbd5e0;
        }
        .services h2 {
            font-size: 32px;
            font-weight: 900;
            color: #031424;
            margin-top: 0;
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .services-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: space-between;
        }
        .service-box {
            flex: 1;
            min-width: 280px;
            padding: 0 10px;
        }
        .service-icon {
            width: 60px;
            height: 60px;
            color: #0056b3;
            margin: 0 auto 25px auto;
        }
        .service-box h3 {
            font-size: 14px;
            font-weight: 900;
            color: #031424;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 12px;
        }
        .service-box h3::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 2px;
            background-color: #0088ff;
        }
        .service-box p {
            font-size: 13px;
            color: #666666;
            line-height: 1.6;
        }

        /* --- Direct Office Contact Strip --- */
        .contact {
            background-image: linear-gradient(to right, #031424 50%, rgba(3, 20, 36, 0.85) 100%), 
                              url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            padding: 80px 0;
        }
        .contact .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
        }
        .contact-left {
            flex: 1;
            min-width: 300px;
        }
        .contact-left h2 {
            font-size: 34px;
            font-weight: 900;
            line-height: 1.2;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .contact-left p {
            font-size: 14px;
            opacity: 0.8;
            margin: 0;
            max-width: 380px;
        }
        .contact-right {
            display: flex;
            flex-direction: column;
            gap: 25px;
            flex: 1;
            min-width: 300px;
            max-width: 500px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .contact-icon-box {
            width: 44px;
            height: 44px;
            background-color: #0056b3;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            flex-shrink: 0;
        }
        .contact-icon-box svg {
            width: 20px;
            height: 20px;
        }
        .contact-details h4 {
            margin: 0 0 3px 0;
            font-size: 10px;
            color: #0088ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .contact-details p, .contact-details a {
            margin: 0;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }
        .contact-details a:hover {
            text-decoration: underline;
        }

        /* --- Footer Base --- */
        footer {
            background-color: #020d18;
            color: #ffffff;
            padding: 50px 0;
            font-size: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
        }
        .footer-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .footer-divider {
            width: 1px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.15);
        }
        .footer-brand-pitch {
            font-size: 12px;
            font-weight: bold;
            line-height: 1.4;
            color: #ffffff;
        }
        .footer-brand-pitch span {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            font-weight: normal;
        }
        .footer-right {
            text-align: right;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.5;
        }

        /* --- Responsive Queries --- */
