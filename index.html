<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Business Card Layout Container */
        .card-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 1.58 / 1; /* Standard business card proportions */
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
        }

        /* Left Content Area */
        .left-panel {
            width: 55%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 7% 5% 8% 7%;
            z-index: 3;
        }

        /* Logo Construction */
        .logo-wrapper {
            width: 80%;
            max-width: 280px;
            margin-bottom: 20px;
        }

        .mp-logo-svg {
            width: 100%;
            height: auto;
            fill: #0a2540;
        }

        /* Typography */
        .company-name {
            color: #0a2540;
            font-size: clamp(1.4rem, 2.8vw, 2.5rem);
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: auto;
        }

        /* Right Structural/Visual Area */
        .right-panel {
            position: absolute;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 1;
        }

        /* Geometric Swash Curves matching the card */
        .curve-accent-dark {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0056b3;
            clip-path: ellipse(95% 100% at 95% 50%);
            z-index: 1;
        }

        .curve-accent-light {
            position: absolute;
            top: 0;
            left: 4%;
            width: 100%;
            height: 100%;
            background: #ffffff;
            clip-path: ellipse(95% 100% at 95% 50%);
            z-index: 2;
        }

        /* Machining Backdrop Window */
        .machining-graphic-bg {
            position: absolute;
            top: 0;
            right: 0;
            width: 90%;
            height: 100%;
            background-color: #d1d5db;
            /* Embedded clean CSS illustration representing the mill/lathe mechanics from the card */
            background-image: 
                linear-gradient(90deg, transparent 40%, rgba(255,255,255,0.15) 40%, rgba(255,255,255,0.15) 60%, transparent 60%),
                linear-gradient(0deg, #999 2px, transparent 2px),
                linear-gradient(90deg, #bbb 2px, transparent 2px),
                radial-gradient(circle at 70% 30%, #ffffff 0%, transparent 60%),
                linear-gradient(135deg, #e5e7eb 0%, #9ca3af 100%);
            background-size: 100% 100%, 20px 20px, 20px 20px, 100% 100%, 100% 100%;
            z-index: 0;
            opacity: 0.95;
        }

        /* Simulated industrial metallic components using CSS shapes */
        .spindle-shaft {
            position: absolute;
            top: 0;
            right: 20%;
            width: 22%;
            height: 45%;
            background: linear-gradient(90deg, #777 0%, #ddd 30%, #fff 50%, #bbb 75%, #555 100%);
            border-bottom: 8px solid #444;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2);
        }

        .spindle-ridge {
            position: absolute;
            bottom: 10%;
            right: 17%;
            width: 28%;
            height: 10%;
            background: linear-gradient(90deg, #555, #ccc, #fff, #aaa, #333);
            border-radius: 3px;
        }

        .chuckle-block {
            position: absolute;
            bottom: 15%;
            right: 10%;
            width: 40%;
            height: 32%;
            background: linear-gradient(0deg, #666 0%, #e5e7eb 25%, #9ca3af 50%, #f3f4f6 80%, #444 100%);
            border: 1px solid #777;
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .dial-gauge {
            position: absolute;
            bottom: 25%;
            right: 38%;
            width: 20%;
            height: 22%;
            background: repeating-linear-gradient(90deg, #888, #888 2px, #ddd 2px, #ddd 10px);
            border: 2px solid #555;
            border-radius: 50% 50% 40% 40% / 10% 10% 10% 10%;
            transform: rotate(-15deg);
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .card-container {
                aspect-ratio: auto;
                height: auto;
                flex-direction: column-reverse;
            }
            .left-panel {
                width: 100%;
                padding: 30px 20px;
            }
            .right-panel {
                position: relative;
                width: 100%;
                height: 220px;
            }
            .curve-accent-dark, .curve-accent-light {
                clip-path: ellipse(100% 85% at 50% 100%);
            }
            .machining-graphic-bg {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        
        
        <div class="left-panel">
            <div class="logo-wrapper">
                <!-- SVG built to replicate the precise "MP" intersecting circular logo from your card profile -->
                <svg class="mp-logo-svg" viewBox="0 0 500 500" xmlns="http://w3.org">
                    <!-- Outer circular crest line -->
                    <path d="M 250,30 A 220,220 0 1,1 110,75" stroke="#0a2540" stroke-width="26" fill="none" stroke-linecap="round"/>
                    <!-- The structural M and P glyph shapes -->
                    <path d="M 80,400 L 80,180 L 190,320 L 300,180 L 300,400" stroke="#0a2540" stroke-width="44" fill="none" stroke-linejoin="miter" stroke-linecap="square"/>
                    <path d="M 300,180 L 400,180 C 460,180 460,290 400,290 L 300,290" stroke="#0a2540" stroke-width="44" fill="none" stroke-linejoin="miter" stroke-linecap="square"/>
                </svg>
            </div>
            
            <h1 class="company-name">Marlow Modern Plastics</h1>
        </div>

        <!-- Right Side: Graphic Accents & Machinery Imagery -->
        <div class="right-panel">
            <div class="machining-graphic-bg">
                <div class="spindle-shaft"></div>
                <div class="spindle-ridge"></div>
                <div class="chuckle-block"></div>
                <div class="dial-gauge"></div>
            </div>
            <div class="curve-accent-dark"></div>
            <div class="curve-accent-light"></div>
        </div>

    </div>

</body>
</html>
