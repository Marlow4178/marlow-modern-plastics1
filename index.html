<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics LLC</title>
    <style>
        /* --- General Reset & Setup --- */
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* --- Header Navigation --- */
        header {
            background-color: transparent;
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .nav-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
        }
        .brand-logo {
            display: flex;
            flex-direction: column;
        }
        .brand-logo h1 {
            margin: 0;
            font-size: 38px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
            line-height: 0.9;
        }
        .brand-logo h1 span {
            color: #0076c4;
        }
        .brand-logo p {
            margin: 6px 0 0 0;
            font-size: 9px;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 0.8px;
            opacity: 0.9;
            text-transform: uppercase;
        }
        nav {
            display: flex;
            gap: 30px;
        }
        nav a {
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.85;
            transition: opacity 0.2s ease;
        }
        nav a:hover {
            opacity: 1;
        }

        /* --- Hero Section with Dark Industrial Overlay --- */
        .hero {
            padding: 220px 0 140px 0;
            position: relative;
            background-image: linear-gradient(to right, rgba(3, 20, 36, 0.95) 45%, rgba(3, 20, 36, 0.4) 100%), 
                              url('https://unsplash.com');
            background-size: cover;
            background-position: center right;
            background-repeat: no-repeat;
            color: #ffffff;
        }
        .hero-content {
            max-width: 580px;
        }
        .hero-title {
            font-size: 54px;
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -0.5px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
        }
        .hero-subtitle {
            font-size: 13px;
            color: #0076c4;
            font-weight: 800;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        .hero p {
            font-size: 14.5px;
            line-height: 1.75;
            margin-bottom: 35px;
            color: #ffffff;
            opacity: 0.85;
        }
        
        /* Hero Call Action Buttons */
        .hero-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn-call {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #0056b3;
            color: #ffffff;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border-radius: 4px;
            transition: background 0.2s ease;
        }
        .btn-call:hover {
            background-color: #004494;
        }
        .btn-mail {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.35);
            padding: 11px 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border-radius: 4px;
            transition: background 0.2s ease;
        }
        .btn-mail:hover {
            background-color: rgba(255, 255, 255, 0.12);
        }
        .btn-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* --- Solutions Section Grid --- */
        .services {
            padding: 90px 0 110px 0;
            text-align: center;
            background-color: #ffffff;
        }
        .section-tag {
            font-size: 11px;
            font-weight: bold;
            color: #0056b3;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 12px;
        }
        .section-tag::before, .section-tag::after {
            content: " — ";
            color: #cbd5e0;
        }
        .services h2 {
            font-size: 34px;
            font-weight: 900;
            color: #031424;
            margin-top: 0;
            margin-bottom: 70px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .services-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: space-between;
        }
        .service-box {
            flex: 1;
            min-width: 290px;
            padding: 0 15px;
        }
        .service-icon-svg {
            width: 50px;
            height: 50px;
            color: #0056b3;
            margin: 0 auto 25px auto;
            display: block;
        }
        .service-box h3 {
            font-size: 14px;
            font-weight: 900;
            color: #031424;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 12px;
        }
        .service-box h3::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 2px;
            background-color: #0088ff;
        }
        .service-box p {
            font-size: 13.5px;
            color: #666666;
            line-height: 1.65;
        }

        /* --- Direct Office Contact Base Strip --- */
        .contact {
            background-image: linear-gradient(to right, #031424 45%, rgba(3, 20, 36, 0.85) 100%), 
                              url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            padding: 90px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .contact .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 50px;
        }
        .contact-left {
            flex: 1;
            min-width: 320px;
        }
        .contact-left h2 {
            font-size: 36px;
            font-weight: 900;
            line-height: 1.15;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .contact-left p {
            font-size: 14.5px;
            opacity: 0.8;
            margin: 0;
            max-width: 400px;
        }
        .contact-right {
            display: flex;
            flex-direction: column;
            gap: 25px;
            flex: 1;
            min-width: 320px;
            max-width: 500px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .contact-icon-box {
            width: 44px;
            height: 44px;
            background-color: #0056b3;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            flex-shrink: 0;
        }
        .contact-icon-box svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        .contact-details h4 {
            margin: 0 0 4px 0;
            font-size: 10px;
            color: #0088ff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
        }
        .contact-details p, .contact-details a {
            margin: 0;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }
        .contact-details a:hover {
            text-decoration: underline;
        }

        /* --- Footer --- */
        footer {
            background-color: #020d18;
            color: #ffffff;
            padding: 60px 0;
            font-size: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
        }
        .footer-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .footer-brand-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            line-height: 1;
        }
        .footer-brand-title span {
            color: #0076c4;
        }
        .footer-divider {
            width: 1px;
            height: 35px;
            background-color: rgba(255, 255, 255, 0.15);
        }
