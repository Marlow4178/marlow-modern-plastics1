<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlow Modern Plastics LLC</title>
    <style>
        /* --- General Page Setup --- */
        body {
            font-family: Arial, sans-serif;
            color: #333333;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- Logo Components --- */
        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        /* Modernized dynamic logo with abstract integrated plastic injection/layer lines */
        .logo-circle {
            background: linear-gradient(135deg, #0d3b66 0%, #0056b3 100%);
            color: #ffffff;
            width: 45px;
            height: 45px;
            border-radius: 12px; /* Sleek rounded square look */
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 0.5px;
            box-shadow: 0 3px 6px rgba(13,59,102,0.16);
            border: 2px solid #0d3b66;
            position: relative;
            overflow: hidden;
        }
        .logo-circle::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.15) 50%, transparent 55%);
            animation: shine 6s infinite linear;
        }
        @keyframes shine {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }
        
        .logo-text h1 {
            margin: 0;
            font-size: 22px;
            color: #051923;
            letter-spacing: 1.5px;
            line-height: 1.1;
            font-weight: 900;
        }
        .logo-text span {
            margin: 0;
            font-size: 10px;
            color: #0077b6;
            font-weight: bold;
            display: block;
            letter-spacing: 1px;
        }

        /* --- Header Navigation --- */
        header {
            background-color: #ffffff;
            border-bottom: 2px solid #e0e0e0;
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .nav-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333333;
            font-weight: bold;
            font-size: 14px;
            transition: color 0.2s ease;
        }
        nav a:hover {
            color: #0077b6;
        }
        nav a.quote-btn {
            background-color: #0056b3;
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 4px;
        }
        nav a.quote-btn:hover {
            background-color: #0d3b66;
            color: #ffffff;
        }

        /* --- Welcome Hero Layout Split --- */
        .hero {
            margin-top: 80px;
            padding: 80px 0;
            background: linear-gradient(135deg, #ffffff 0%, #f4f9ff 100%);
        }
        .hero .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }
        .hero-left {
            flex: 1;
            max-width: 550px;
        }
        .hero .big-logo {
            margin-bottom: 25px;
        }
        .hero .big-logo .logo-circle {
            width: 75px;
            height: 75px;
            font-size: 32px;
            border-radius: 18px;
        }
        .hero .big-logo .logo-text h1 {
            font-size: 36px;
        }
        .hero .big-logo .logo-text span {
            font-size: 14px;
        }
        .hero-subtitle {
            font-size: 24px;
            color: #051923;
            font-weight: bold;
            margin-bottom: 20px;
            border-left: 4px solid #0077b6;
            padding-left: 15px;
        }
        .hero p {
            font-size: 16px;
            margin-bottom: 35px;
            color: #444444;
        }
        .btn {
            display: inline-block;
            background-color: #0056b3;
            color: #ffffff;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            margin-right: 15px;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background-color: #0d3b66;
        }
        .btn-outline {
            background-color: transparent;
            color: #0056b3;
            border: 2px solid #0056b3;
            padding: 10px 23px;
        }
        .btn-outline:hover {
            background-color: #0056b3;
            color: #ffffff;
        }

        /* --- Recreated CNC Graphic Showcase --- */
        .hero-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 320px;
        }
        .cnc-display-card {
            background: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
            position: relative;
        }
        /* Interactive dynamic animation simulating precision machining */
        .cnc-laser-head {
            animation: cncMove 4s infinite ease-in-out;
        }
        .cnc-spark-line {
            animation: sparkCut 4s infinite ease-in-out;
            stroke-dasharray: 5;
        }
        @keyframes cncMove {
            0% { transform: translate(0, 0); }
            25% { transform: translate(60px, 40px); }
            50% { transform: translate(120px, 10px); }
            75% { transform: translate(40px, 70px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes sparkCut {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* --- Core Services Grid --- */
        .services {
            padding: 60px 0;
            background-color: #fcfcfc;
        }
        .services h2 {
            text-align: center;
            color: #051923;
            font-size: 28px;
            margin-bottom: 40px;
        }
        .services-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
        }
        .service-box {
            flex: 1;
            min-width: 230px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 25px;
            border-radius: 6px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .service-box h3 {
            color: #051923;
            margin-top: 0;
            margin-bottom: 15px;
        }

        /* --- Business Description --- */
        .about {
            background-color: #ffffff;
            padding: 60px 0;
            border-top: 1px solid #e0e0e0;
        }
        .about h2 {
            color: #051923;
            font-size: 28px;
        }
        .bullets {
            margin-top: 20px;
            padding-left: 20px;
        }
        .bullets li {
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* --- Direct Office Contact --- */
        .contact {
            background-color: #f4f9ff;
            padding: 60px 0;
            text-align: center;
        }
        .contact h2 {
            margin-bottom: 40px;
            color: #051923;
        }
        .contact-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 20px;
        }
        .contact-item h4 {
            margin: 0 0 5px 0;
            color: #777777;
            text-transform: uppercase;
        }
        .contact-item p {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
        }

        /* --- Footer --- */
        footer {
            background-color: #051923;
            color: #ffffff;
            padding: 40px 0;
            font-size: 14px;
        }
        .footer-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .footer-left .logo-text h1 {
            color: #ffffff;
        }
        .footer-left .logo-circle {
            border: 2px solid #ffffff;
        }
        .footer-right {
            max-width: 500px;
            text-align: right;
            color: #cccccc;
        }
        .copyright {
            text-align: center;
            margin-top: 30px;
            color: #777777;
            font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            .hero .container {
                flex-direction: column;
                padding-top: 40px;
            }
            .nav-box {
                flex-direction: column;
                gap: 15px;
            }
            nav a {
                margin: 0 10px;
                font-size: 13px;
            }
            .hero-right {
                width: 100%;
            }
            .contact-row {
                flex-direction: column;
                gap: 30px;
            }
